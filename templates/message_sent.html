<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .message-box{
            max-width:500px;
            margin:80px auto;
            background:rgb(232, 105, 141);
            padding:30px;
            border-radius:16px;
            text-align:center;
            box-shadow:0 0 12px rgba(231, 112, 182, 0.1);
        }
        .message-box h1{
            color:#c08888dc;
        }
        .message-box p{
            color:#555;
            font-size:18px;
        }
    </style>
</head>
<body>

<div class="message-box">
    <h1>✅ Message Sent</h1>
    <p>Thank you, {{ name }}. We received your message.</p>
    <a href="{{ url_for('home') }}" class="btn">Back to Home</a>
</div>

</body>
</html>
