<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users | Flower Shop</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdf8f5;
            color: #2d2420;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #9e2a2f;
            color: white;
            padding: 30px 20px;
        }

        .sidebar h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
        }

        .sidebar a {
            display: block;
            text-decoration: none;
            color: white;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            transition: 0.3s;
            font-weight: 500;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(255,255,255,0.15);
        }

        .main-content {
            flex: 1;
            padding: 35px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .top-bar h1 {
            font-size: 32px;
            font-family: 'Cormorant Garamond', serif;
        }

        .section-box {
            background: white;
            padding: 25px;
            border-radius: 22px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #f0dfd8;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        table th, table td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        table th {
            color: #7a4e42;
        }

        .role {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            background: #f7e4dc;
            color: #9e2a2f;
        }

        .btn-delete {
            background: #c0392b;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-delete:hover {
            background: #a93226;
        }

        @media (max-width: 900px) {
            .admin-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="admin-container">

    <div class="sidebar">
        <h2>Admin Panel</h2>
     <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
        <a href="{{ url_for('admin_products') }}">Manage Products</a>
        <a href="{{ url_for('admin_orders') }}">Manage Orders</a>
        <a href="{{ url_for('admin_users') }}">Manage Users</a>
        <a href="{{ url_for('admin_messages') }}">Manage Messages</a>
        <a href="{{ url_for('admin_coupons') }}" class="btn">Manage Coupons</a>
        <a href="{{ url_for('index') }}">Back to Website</a>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1>Manage Users</h1>
        </div>

        <div class="section-box">
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Orders Count</th>
                        <th></th>
                        <th>Action</th>
                    </tr>
                </thead>
<tbody>
    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.orders_count }}</td>
        <td><span class="role">{{ user.role }}</span></td>
        <td>
    <form action="{{ url_for('delete_user', user_id=user.id) }}" method="POST" style="display:inline;">
        <button type="submit" class="btn-delete">Delete</button>
    </form>
</td>
    </tr>
    {% endfor %}
</tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
