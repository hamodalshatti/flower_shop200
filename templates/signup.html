<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Flower Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fefaf7;
            font-family: 'Inter', sans-serif;
            color: #2c241f;
            scroll-behavior: smooth;
            min-height: 100vh;
        }

        /* Header styling matching the elegant flower shop design */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 32px;
            background: #ffffffdd;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            margin: 20px 40px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            border: 1px solid #f0e4dc;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
        }

        .logo-area:hover {
            opacity: 0.85;
        }

        .logo-icon {
            background: #9e2a2f;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            box-shadow: 0 6px 14px rgba(158,42,47,0.2);
        }

        .logo-text {
            font-size: 26px;
            font-weight: 600;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: -0.5px;
            color: #3e2a27;
        }

        .logo-text span {
            color: #9e2a2f;
            font-weight: 700;
        }

        /* Sign Up Page Container */
        .signup-page {
            min-height: calc(100vh - 140px);
            padding: 40px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signup-container {
            max-width: 650px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.12);
            border: 1px solid #f0e4dc;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* Form Section */
        .signup-form-section {
            padding: 48px 44px;
        }

        .signup-header {
            margin-bottom: 32px;
            text-align: center;
        }

        .signup-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 600;
            color: #3e2a27;
            margin-bottom: 10px;
        }

        .signup-header p {
            color: #7f6a60;
            font-size: 0.95rem;
        }

        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-row-2 {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }

        .form-row-2 .form-group {
            flex: 1;
            min-width: 140px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #3e2a27;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .form-group label i {
            margin-right: 6px;
            color: #9e2a2f;
            font-size: 0.8rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 42px 12px 16px;
            border: 1.5px solid #eedfd7;
            border-radius: 60px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            background: #fffdfb;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #9e2a2f;
            box-shadow: 0 0 0 3px rgba(158,42,47,0.08);
        }

        /* Error state */
        .form-group input.error-input {
            border-color: #e53e3e;
            background-color: #fff8f8;
        }

        .error-message {
            font-size: 0.7rem;
            margin-top: 6px;
            margin-left: 14px;
            color: #e53e3e;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        /* Password Toggle Button */
        .password-toggle-signup {
            position: absolute;
            right: 16px;
            bottom: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            color: #9e2a2f;
            background: transparent;
            transition: all 0.2s;
            user-select: none;
            padding: 4px;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle-signup:hover {
            background: #fef0ec;
            color: #7b2125;
        }

        /* Terms & Conditions */
        .terms-checkbox {
            margin: 10px 0 5px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #5e4b41;
        }

        .checkbox-label input {
            display: none;
        }

        .checkmark {
            width: 18px;
            height: 18px;
            border: 2px solid #9e2a2f;
            border-radius: 5px;
            display: inline-block;
            position: relative;
            transition: all 0.2s ease;
            background: white;
        }

        .checkbox-label input:checked + .checkmark {
            background-color: #9e2a2f;
            border-color: #9e2a2f;
        }

        .checkbox-label input:checked + .checkmark::after {
            content: "✓";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 11px;
        }

        .checkbox-label a {
            color: #9e2a2f;
            text-decoration: none;
            font-weight: 500;
        }

        .checkbox-label a:hover {
            text-decoration: underline;
        }

        /* Sign Up Button */
        .signup-btn {
            width: 100%;
            background: #9e2a2f;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
            font-family: 'Inter', sans-serif;
        }

        .signup-btn:hover {
            background: #7b2125;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(158,42,47,0.25);
        }

        .login-link {
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #f0e2db;
        }

        .login-link p {
            color: #5e4b41;
            font-size: 0.9rem;
        }

        .login-link a {
            color: #9e2a2f;
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Animation */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-container {
            animation: slideUp 0.5s ease-out;
        }

        /* Shake effect for errors */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }
        .shake-effect {
            animation: shake 0.35s ease-in-out 0s 1;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .signup-form-section {
                padding: 36px 28px;
            }
            .header {
                margin: 16px 20px;
                padding: 14px 20px;
            }
            .logo-text {
                font-size: 22px;
            }
        }

        @media (max-width: 576px) {
            .signup-form-section {
                padding: 28px 20px;
            }
            .form-row-2 {
                flex-direction: column;
                gap: 20px;
            }
            .signup-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="header">
        <div class="logo-area" onclick="window.location.href='/'">
            <div class="logo-icon"><i class="fas fa-leaf"></i></div>
            <div class="logo-text">Flower<span>&</span>Shop</div>
        </div>
    </div>

    <!-- Sign Up Section -->
    <div class="signup-page">
        <div class="signup-container">
            <!-- Form Section - Only form, no right side benefits -->
            <div class="signup-form-section">
                <div class="signup-header">
                    <h1>Create Account</h1>
                    <p>Join us and start your flower journey</p>
                </div>

                <!-- Form connected to backend -->
                <form class="signup-form" id="signupForm" action="{{ url_for('create_user') }}" method="POST">
                    <div class="form-row-2">
                        <div class="form-group" id="firstNameGroup">
                            <label><i class="fas fa-user"></i> First Name</label>
                            <input type="text" id="firstName" name="firstName" placeholder="Enter your first name">
                            <div class="error-message" id="firstNameError" style="display: none;">
                                <i class="fas fa-exclamation-circle"></i> <span>First name is required</span>
                            </div>
                        </div>
                        <div class="form-group" id="lastNameGroup">
                            <label><i class="fas fa-user"></i> Last Name</label>
                            <input type="text" id="lastName" name="lastName" placeholder="Enter your last name">
                            <div class="error-message" id="lastNameError" style="display: none;">
                                <i class="fas fa-exclamation-circle"></i> <span>Last name is required</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group" id="emailGroup">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email">
                        <div class="error-message" id="emailError" style="display: none;">
                            <i class="fas fa-exclamation-circle"></i> <span>Valid email is required</span>
                        </div>
                    </div>

                    <div class="form-group" id="phoneGroup">
                        <label><i class="fas fa-phone"></i> Phone Number</label>
                        <input type="tel" id="phone" name="Phone" placeholder="Enter your phone number">
                        <div class="error-message" id="phoneError" style="display: none;">
                            <i class="fas fa-exclamation-circle"></i> <span>Phone number is required</span>
                        </div>
                    </div>

                    <div class="form-row-2">
                        <div class="form-group" id="passwordGroup">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="password" name="password" placeholder="Create a password">
                            <span class="password-toggle-signup" id="togglePasswordBtn">
                                <i class="far fa-eye" id="eyeIcon"></i>
                            </span>
                            <div class="error-message" id="passwordError" style="display: none;">
                                <i class="fas fa-exclamation-circle"></i> <span>Password must be at least 6 characters</span>
                            </div>
                        </div>
                        <div class="form-group" id="confirmGroup">
                            <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password">
                            <div class="error-message" id="confirmError" style="display: none;">
                                <i class="fas fa-exclamation-circle"></i> <span>Passwords do not match</span>
                            </div>
                        </div>
                    </div>

                    <!-- Terms and Conditions -->
                    <div class="terms-checkbox">
                        <label class="checkbox-label">
                            <input type="checkbox" id="termsCheckbox" name="terms">
                            <span class="checkmark"></span>
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </label>
                        <div class="error-message" id="termsError" style="display: none;">
                            <i class="fas fa-exclamation-circle"></i> <span>You must agree to the terms</span>
                        </div>
                    </div>

                    <!-- Create Account Button -->
                    <button type="submit" class="signup-btn">
                        <span>Create Account</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <div class="login-link">
                    <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
       
        const firstName = document.getElementById('firstName');
        const lastName = document.getElementById('lastName');
        const email = document.getElementById('email');
        const phone = document.getElementById('phone');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const termsCheckbox = document.getElementById('termsCheckbox');
        const signupForm = document.getElementById('signupForm');

        // Error elements
        const firstNameError = document.getElementById('firstNameError');
        const lastNameError = document.getElementById('lastNameError');
        const emailError = document.getElementById('emailError');
        const phoneError = document.getElementById('phoneError');
        const passwordError = document.getElementById('passwordError');
        const confirmError = document.getElementById('confirmError');
        const termsError = document.getElementById('termsError');

        // Password toggle elements
        const togglePasswordBtn = document.getElementById('togglePasswordBtn');
        const eyeIcon = document.getElementById('eyeIcon');

        // Helper: Set field error
        function setFieldError(inputElement, errorDiv, message, isValid) {
            if (!isValid) {
                inputElement.classList.add('error-input');
                if (errorDiv) {
                    const span = errorDiv.querySelector('span');
                    if (span) span.innerText = message;
                    errorDiv.style.display = 'flex';
                }
                inputElement.classList.add('shake-effect');
                setTimeout(() => inputElement.classList.remove('shake-effect'), 300);
            } else {
                inputElement.classList.remove('error-input');
                if (errorDiv) errorDiv.style.display = 'none';
            }
        }

        // Validation functions
        function isValidEmail(emailVal) {
            const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            return emailRegex.test(emailVal);
        }

        function isValidPhone(phoneVal) {
            return phoneVal && phoneVal.trim().length >= 8;
        }

        function isValidPassword(passwordVal) {
            return passwordVal && passwordVal.trim().length >= 6;
        }

        // Toggle password visibility
        function togglePasswordVisibility() {
            const currentType = password.getAttribute('type');
            if (currentType === 'password') {
                password.setAttribute('type', 'text');
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                password.setAttribute('type', 'password');
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
            password.focus();
        }

        if (togglePasswordBtn) {
            togglePasswordBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                togglePasswordVisibility();
            });
        }

        // Form submission validation
        signupForm.addEventListener('submit', function(e) {
            let isValid = true;

            // First Name
            if (!firstName.value.trim()) {
                setFieldError(firstName, firstNameError, 'First name is required', false);
                isValid = false;
            } else {
                setFieldError(firstName, firstNameError, '', true);
            }

            // Last Name
            if (!lastName.value.trim()) {
                setFieldError(lastName, lastNameError, 'Last name is required', false);
                isValid = false;
            } else {
                setFieldError(lastName, lastNameError, '', true);
            }

            // Email
            if (!email.value.trim()) {
                setFieldError(email, emailError, 'Email address is required', false);
                isValid = false;
            } else if (!isValidEmail(email.value.trim())) {
                setFieldError(email, emailError, 'Please enter a valid email address', false);
                isValid = false;
            } else {
                setFieldError(email, emailError, '', true);
            }

            // Phone
            if (!phone.value.trim()) {
                setFieldError(phone, phoneError, 'Phone number is required', false);
                isValid = false;
            } else if (!isValidPhone(phone.value.trim())) {
                setFieldError(phone, phoneError, 'Please enter a valid phone number', false);
                isValid = false;
            } else {
                setFieldError(phone, phoneError, '', true);
            }

            // Password
            if (!password.value) {
                setFieldError(password, passwordError, 'Password is required', false);
                isValid = false;
            } else if (!isValidPassword(password.value)) {
                setFieldError(password, passwordError, 'Password must be at least 6 characters', false);
                isValid = false;
            } else {
                setFieldError(password, passwordError, '', true);
            }

            // Confirm Password
            if (!confirmPassword.value) {
                setFieldError(confirmPassword, confirmError, 'Please confirm your password', false);
                isValid = false;
            } else if (password.value !== confirmPassword.value) {
                setFieldError(confirmPassword, confirmError, 'Passwords do not match', false);
                isValid = false;
            } else {
                setFieldError(confirmPassword, confirmError, '', true);
            }

            // Terms Checkbox
            if (!termsCheckbox.checked) {
                setFieldError(termsCheckbox, termsError, 'You must agree to the terms', false);
                isValid = false;
            } else {
                termsError.style.display = 'none';
            }

            if (!isValid) {
                e.preventDefault();
                const container = document.querySelector('.signup-container');
                container.classList.add('shake-effect');
                setTimeout(() => container.classList.remove('shake-effect'), 450);
                return false;
            }

            return true;
        });

        // Real-time error clearing
        const allInputs = [firstName, lastName, email, phone, password, confirmPassword];
        allInputs.forEach(input => {
            input.addEventListener('input', function() {
                input.classList.remove('error-input');
                const errorDiv = input.parentElement.querySelector('.error-message');
                if (errorDiv) errorDiv.style.display = 'none';
            });
        });

        termsCheckbox.addEventListener('change', function() {
            if (termsCheckbox.checked) {
                termsError.style.display = 'none';
            }
        });

        // Set initial eye icon state
        if (password.type === 'password') {
            eyeIcon.classList.add('fa-eye');
            eyeIcon.classList.remove('fa-eye-slash');
        }

        // Handle server-side errors from backend
        function handleServerErrors() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error === 'email_exists') {
                setFieldError(email, emailError, 'Email already registered. Please sign in.', false);
                email.focus();
            } else if (error === 'signup_failed') {
                const container = document.querySelector('.signup-container');
                container.classList.add('shake-effect');
                setTimeout(() => container.classList.remove('shake-effect'), 500);
            }
        }

        window.addEventListener('DOMContentLoaded', handleServerErrors);
    </script>
</body>
</html>
