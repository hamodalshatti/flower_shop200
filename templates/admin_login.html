<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Flower Shop</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fff6f2 0%, #fde9e2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2d2420;
        }

        .login-box {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #f0dfd8;
        }

        .login-box h1 {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 38px;
            margin-bottom: 10px;
            color: #9e2a2f;
        }

        .login-box p {
            text-align: center;
            margin-bottom: 25px;
            color: #7a5d53;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e6d7d0;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
        }

        .form-group input:focus {
            border-color: #9e2a2f;
        }

        .btn {
            width: 100%;
            background: #9e2a2f;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            background: #7f1f24;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #9e2a2f;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>Admin Login</h1>
        <p>Sign in to access the admin dashboard</p>

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter admin email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <a href="{{ url_for('home') }}" class="back-link">Back to Website</a>
    </div>

</body>
</html>
