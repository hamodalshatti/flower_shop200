<!DOCTYPE html>
<html lang="{{ 'ar' if lang == 'ar' else 'en' }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">

<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<title>Sign In - Flower Shop</title>
<style>  * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fefaf7;
            font-family: 'Inter', sans-serif;
            color: #2c241f;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 32px;
            background: #ffffffdd;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            margin: 20px 40px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            border: 1px solid #f0e4dc;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            background: #9e2a2f;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            box-shadow: 0 6px 14px rgba(158,42,47,0.2);
        }

        .logo-text {
            font-size: 26px;
            font-weight: 600;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: -0.5px;
            color: #3e2a27;
        }

        .logo-text span {
            color: #9e2a2f;
            font-weight: 700;
        }

        .header-link {
            display: flex;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
        }

        .header-link a {
            text-decoration: none;
            font-weight: 500;
            color: #3e2a27;
            transition: 0.2s;
            font-size: 1rem;
        }

        .header-link a:hover {
            color: #9e2a2f;
        }</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-leaf"></i></div>
        <div class="logo-text">Flower<span>&</span>Shop</div>
    </div>

       <!-- هدول ما بدي اياهم بصفحه الlog in 

 <div class="header-link">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('index') }}">Our shop</a>
        <a href="{{ url_for('contact') }}">Contact</a>
        <a href="{{ url_for('login') }}" class="btn">Sign in</a>
    </div> 
    -->

</div>

<div class="signin-container">
<div class="signin-card">

<div class="signin-header">
<h2>Welcome </h2>
<p>Sign in to continue your flower journey</p>
</div>

<form class="signin-form" action="{{ url_for('check_login') }}" method="POST">

<div class="form-group">
<label>Email</label>
<input type="email" name="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" id="password" placeholder="Enter your password" required>

<span class="password-toggle" onclick="togglePassword()">👁</span>
</div>

<div class="form-options">

<label class="remember-me">
<input type="checkbox">
Remember me
</label>

<a href="{{ url_for('forgot_pass') }}" class="forgot-password">
Forgot password?
</a>

</div>

<button type="submit" class="btn signin-btn">
Sign In →
</button>

</form>

<div class="signup-link">
<p>Don't have an account?
<a href="{{ url_for('signup') }}">Sign up</a>
</p>
</div>

<div class="signin-footer">
<p>🔐 Secured by SSL encryption</p>
</div>

</div>
</div>

<script>
function togglePassword(){

const passwordInput = document.getElementById("password");

if(passwordInput.type === "password"){
passwordInput.type = "text";
}else{
passwordInput.type = "password";
}

}
</script>

</body>
</html>
